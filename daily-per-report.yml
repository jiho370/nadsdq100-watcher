# =============================================================================
# S&P500 데일리 리포트 + 1회성 백테스트 워크플로 (GitHub Actions)
#
# 이 파일은 저장소의 .github/workflows/daily-per-report.yml 경로에 두세요.
#
# 구성:
#   - report   잡: 매일 cron 으로 리포트 생성/발송 (모드 자동 분기)
#   - backtest 잡: Actions 탭 > "Run workflow" > run_backtest 체크 시에만 실행.
#                  실제 데이터로 백테스트를 깃허브 서버가 대신 돌리고 결과(backtest.txt/png)를
#                  아티팩트로 업로드. "가끔 한 번"만 누르면 됨(매일 돌릴 필요 없음).
#
# 모드 분기(report): 스크립트가 한국시간 요일 + 휴장 연속일수로 자동 판단.
#   평일.데이터갱신=4섹션 / 휴장1=TOP10 / 휴장2=섹터 / 휴장3=펀더멘탈TOP10 /
#   휴장4+=메일스킵 / 토=주간결산 / 일=차주전략. 매일 실행해도 중복 메일은 안 옴.
#
# 상태 영속화(중요): Actions 러너는 매 실행 초기화 > 휴장 streak.신규/이탈 추적이
#   유지되려면 state_prev_list.json 을 commit-back 으로 보존해야 함(아래 마지막 스텝).
# =============================================================================

name: S&P500 Daily Report

on:
  # 자동 스케줄은 하루 1회 — '미국 정규장 마감(16:00 ET) 직후' 그날 종가로 조사·발송.
  #   미국장 마감: 서머타임(EDT) 20:00 UTC / 겨울(EST) 21:00 UTC.
  #   22:00 UTC 로 두면 두 경우 모두 마감 1~2시간 뒤(EOD 데이터 안정화) → KST 07시경.
  #   (더 빨리 원하면 21:30 UTC 등으로 당길 수 있으나, 겨울엔 마감 직후라 데이터가 덜 굳을 수 있음.)
  #   스케줄 실행은 중복이면 자동 스킵(하루 1통). 정확한 정시가 필요하면 외부 트리거(가이드 참고).
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:            # 점검용 강제 실행 — 같은 세션이어도 재발송(skip 안 함)
    inputs:
      force_mode:
        description: "강제 모드(검증용): sections/top10/sector/fund_top10/skip/weekly/strategy"
        required: false
        default: ""
      run_backtest:
        description: "백테스트를 실행할까요?(체크 시 리포트 대신 백테스트만 실행)"
        type: boolean
        default: false

permissions:
  contents: write               # 상태파일(state_prev_list.json) commit-back용

concurrency:
  group: sp500-report
  cancel-in-progress: false

jobs:
  # -- 매일 리포트 (백테스트 X) -----------------------------------------------
  report:
    # 수동 실행에서 백테스트를 고른 경우엔 리포트 잡을 건너뜀
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_backtest != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt   # lxml 포함(위키피디아 섹터 파싱)

      - name: Run report and send email
        env:
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}   # 여러 곳: 시크릿 값에 쉼표로 나열(예: a@x.com, b@y.com, c@z.com)
          # AI 해석 레이어(선택): 키 있으면 총평/근거/검증을 AI가 생성, 없으면 기존 정적 텍스트로 폴백.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_ENABLED:   "1"                  # 0이면 키가 있어도 비활성
          AI_MODEL:     "claude-sonnet-4-6"
          AI_MAX_PICKS: "12"                 # AI에 넘길 최대 종목 수(비용/지연 통제)
          RECO_SECTOR_MAX: "3"
          MIN_SIGNAL_DAYS: "2"
          SEMI_GRANULAR: "1"        # 반도체를 팹리스/IDM/파운드리로 세분 비교. "0"이면 GICS 기본(반도체 통합)
          MIN_PEER: "3"             # 같은 동종업종이 3종목 이상이면 비교, 미만이면 비교 생략
          # 점검용 강제 실행(workflow_dispatch)일 때만 1 → 같은 세션이어도 재발송(skip 안 함).
          # 스케줄 자동 실행은 0 → 중복이면 스킵(하루 1통 유지).
          ALLOW_RESEND: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}

          # 선택 설정(os.environ.get 패턴): SECTION_N, TREND_HIGH_FRAC, NOTABLE_RVOL,
          #   NOTABLE_MOVE, NOTABLE_TOPN_MC, HOLIDAY_SKIP_STREAK, WEEKLY_TOP_N,
          #   RECO_N, VOL_TARGET, SECTOR_COVERAGE_MIN 등.
          # 종목 프로필(분기 갱신): sp500_profiles.json 을 저장소에 함께 두면
          #   종목 설명.시장/섹터 총평.GICS 섹터 분류에 사용됩니다(없어도 동작).
          #   경로 변경 시 PROFILES_FILE 환경변수로 지정 가능.
        run: |
          if [ -n "${{ github.event.inputs.force_mode }}" ]; then
            python sp500_daily_report.py --force-mode "${{ github.event.inputs.force_mode }}"
          else
            python sp500_daily_report.py
          fi

      - name: Upload preview
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: report-preview
          path: output/
          if-no-files-found: ignore   # 휴장/중복(skip·skip_dup) 실행은 output/ 가 비어도 경고 없이 통과

      - name: Persist 상태파일 state
        run: |
          if [ -n "$(git status --porcelain state_prev_list.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state_prev_list.json
            git commit -m "chore: update state [skip ci]"
            git push
          else
            echo "변경 없음 - 커밋 생략"
          fi

  # -- 수동 1회성 백테스트 (실제 데이터, 깃허브 서버가 대신 실행) --------------
  backtest:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_backtest == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Run backtest (real data)
        env:
          BT_YEARS:     "5"          # 검증 기간(년)
          BT_TOPK:      "20"         # 매 리밸런싱 보유 종목수(분산 통제)
          BT_COST_BPS:  "5"          # 거래비용(bp)
        run: python sp500_daily_report.py --backtest

      - name: Upload backtest result
        uses: actions/upload-artifact@v6
        with:
          name: backtest-result      # backtest.txt(요약) + backtest.png(곡선)
          path: output/

# -- 사용법 -------------------------------------------------------------------
# 1) 이 파일을  .github/workflows/daily-per-report.yml  로 저장하고 푸시
# 2) 매일 KST 10시경 자동으로 리포트 메일 발송(요일.휴장에 따라 모드 자동 분기)
# 3) 백테스트: Actions > 이 워크플로 > "Run workflow" > run_backtest 체크 후 실행
#      -> 몇 분 뒤 Artifacts 에서 backtest.txt / backtest.png 다운로드
# 4) 특정 모드 미리보기: "Run workflow" > force_mode 에 sector/weekly 등 입력
