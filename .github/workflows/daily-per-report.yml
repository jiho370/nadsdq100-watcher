name: NASDAQ100 Low-PER Daily Report

# 이 파일은 저장소의 .github/workflows/daily-per-report.yml 경로에 두어야 합니다.

on:
  schedule:
    # 매주 평일 22:00 UTC = 한국시간 익일 07:00 (미국장 마감 후, 데이터 확정 시점)
    # 참고: GitHub cron은 UTC 고정이라 서머타임을 따라가지 않습니다. 시간은 자유롭게 조정하세요.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:            # 👈 "Run workflow" 수동 실행 버튼 (지금 당장 테스트용)

permissions:
  contents: write               # 편입/이탈 상태파일(state_prev_list.json) 커밋용

concurrency:                    # 동시 실행 방지
  group: per-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report and send email
        env:
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}
          # 필요 시 SMTP_HOST / SMTP_PORT / EMAIL_FROM 도 secrets로 덮어쓸 수 있음
        run: python nasdaq100_low_per_report.py

      - name: Persist 편입/이탈 state
        run: |
          if [ -n "$(git status --porcelain state_prev_list.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state_prev_list.json
            git commit -m "chore: update prev list [skip ci]"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi
