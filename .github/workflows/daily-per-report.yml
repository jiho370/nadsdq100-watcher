name: S&P500 Daily Report

# 이 파일은 저장소의 .github/workflows/daily-per-report.yml 경로에 두어야 합니다.

on:
  schedule:
    # 01:00 UTC = 한국시간 10:00. 요일 2-6(화~토)은 미국 월~금장 마감분을 받기 위함.
    # GitHub cron은 UTC 고정이라 서머타임을 따라가지 않습니다.
    - cron: "0 1 * * 2-6"
  workflow_dispatch:            # 👈 "Run workflow" 수동 실행 버튼

permissions:
  contents: write               # 추천 명단 상태파일(state_prev_list.json) 커밋용

concurrency:
  group: sp500-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report and send email
        env:
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
          EMAIL_TO:    ${{ secrets.EMAIL_TO }}
          # 선택: RECO_N, RECO_PER_MAX, TREND_MAX 등으로 기준 조정 가능
        run: python sp500_daily_report.py

      - name: Persist 추천 명단 state
        run: |
          if [ -n "$(git status --porcelain state_prev_list.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state_prev_list.json
            git commit -m "chore: update prev list [skip ci]"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi
