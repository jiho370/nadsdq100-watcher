# ─────────────────────────────────────────────────────────────────────────────
# sp500 데일리 리포트 + 1회성 백테스트 워크플로 (GitHub Actions)
#
# 구성:
#   · report  잡: 매일 cron 으로 리포트 생성/발송 (백테스트 안 함)
#   · backtest 잡: Actions 탭에서 버튼(workflow_dispatch)으로 수동 실행 → 실제
#                  데이터로 백테스트를 깃허브 서버가 대신 돌리고 결과를 아티팩트로 업로드.
#                  검증은 이 버튼을 "가끔 한 번"만 누르면 됩니다(매일 돌릴 필요 없음).
#
# 상태파일 영속화(중요): Actions 러너는 매 실행 초기화됨 → 신규/이탈/EXIT 가
#   유지되려면 actions/cache 또는 commit-back 으로 state_prev_list.json 을 보존해야 함.
# ─────────────────────────────────────────────────────────────────────────────

name: sp500-daily-report

on:
  schedule:
    - cron: "0 21 * * 1-5"        # UTC 21:00 ≈ 미 동부장 마감 후(평일). 조정 가능
  workflow_dispatch:
    inputs:
      run_backtest:
        description: "백테스트를 실행할까요?(체크 시 리포트 대신 백테스트만 실행)"
        type: boolean
        default: false

permissions:
  contents: write                  # commit-back 방식 사용 시 필요

jobs:
  # ── 매일 리포트 (백테스트 X) ───────────────────────────────────────────────
  report:
    # 수동 실행에서 백테스트를 고른 경우엔 리포트 잡을 건너뜀
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_backtest != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install yfinance pandas numpy matplotlib openpyxl requests

      - name: Restore state            # 방법 A: cache (가장 간단)
        uses: actions/cache@v4
        with:
          path: state_prev_list.json
          key: sp500-state

      - name: Run report
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
          RECO_SECTOR_MAX: "3"
          MIN_SIGNAL_DAYS: "2"
          REGIME_FILTER: "1"          # SPY 200일선 아래면 위험회피 배너 표시(0=끄기)
        run: python sp500_daily_report.py

      - name: Upload preview
        uses: actions/upload-artifact@v4
        with: { name: report-preview, path: output/ }

  # ── 수동 1회성 백테스트 (실제 데이터, 깃허브 서버가 대신 실행) ──────────────
  backtest:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_backtest == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install yfinance pandas numpy matplotlib openpyxl requests

      - name: Run backtest (real data)
        env:
          BT_YEARS:     "5"          # 검증 기간(년)
          BT_REBALANCE: "21"         # 리밸런싱 주기(거래일) ≈ 월 1회
          BT_TOPK:      "20"         # 매 리밸런싱 보유 종목수
          REGIME_FILTER:       "1"   # SPY가 200일선 아래면 노출 축소(추세전략 낙폭 완화)
          REGIME_OFF_EXPOSURE: "0.3" # 위험회피 시 투자비중(0=전액현금)
          BT_COST_BPS:  "5"          # 거래비용(bp)
          # BT_PER_PROXY: "1"        # (참고용·룩어헤드 편향) 펀더멘털 프록시 켜기
        run: python sp500_daily_report.py --backtest

      - name: Upload backtest result
        uses: actions/upload-artifact@v4
        with:
          name: backtest-result      # backtest.txt(요약) + backtest.png(곡선)
          path: output/

# ── 사용법 ───────────────────────────────────────────────────────────────────
# 1) 이 파일을  .github/workflows/sp500.yml  로 저장하고 푸시
# 2) GitHub → Actions → 'sp500-daily-report' → "Run workflow"
#      └ run_backtest 체크 후 실행하면, 실제 시세로 백테스트가 돌고
#        몇 분 뒤 Artifacts 에서 backtest.txt / backtest.png 를 받아 결과(CAGR·MDD·
#        SPY 대비 승률)를 확인할 수 있습니다.
# 3) 결과가 만족스러우면 그대로 두고, 파라미터(PER 상한·신호 지속일 등)를 바꿀 때만
#    이 버튼을 다시 눌러 재검증하면 됩니다. 매일 돌릴 필요 없습니다.
