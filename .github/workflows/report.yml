# =============================================================================
# 데일리(2통)·주간 시장 리포트 (GitHub Actions — PC 꺼져 있어도 자동 발송)
#
# 스케줄 (Actions cron 은 UTC · KST = UTC+9 · 실제 실행은 수 분 지연될 수 있음):
#   · 한국장 메일: UTC 23:00 일~목 = KST 08:00 월~금 (장전 — 전날 한국장 + 밤사이 미국 마감 표)
#   · 미국장 메일: UTC 07:40 화~토 = KST 16:40 화~토 (그날 새벽 마감 분석 → 17시경 도착)
#   · 주간 배분:   UTC 22:30 토    = KST 07:30 일
#   어느 cron 이 깨웠는지(github.event.schedule)로 --kr / --us / --weekly 를 분기한다.
#
# 비용: 전날 밤/당일 아침 PC 의 pregen_{kr,us}.json 이 있으면 웹검색 검증 생략(haiku만),
#   없으면 sonnet 검증 폴백. 모델·검색 한도는 아래 env.
#
# 필요한 저장소 Secrets (Settings > Secrets and variables > Actions):
#   SMTP_USER          Gmail 주소
#   SMTP_PASS          Gmail 앱 비밀번호
#   EMAIL_TO           수신자(쉼표로 여러 명)
#   ANTHROPIC_API_KEY  AI 해설용 — 2026-07-10 기준 미사용(아래 env에서 주석 처리, AI_ENABLED=0).
#                      pregen(로컬 PC, 구독 CLI)이 있으면 그 캐시로, 없으면 지표 기반
#                      해설(deterministic_report)로 자동 대체 — 발송은 계속됨. 나중에 API를
#                      다시 쓰려면 아래 env 블록의 주석을 풀고 이 Secret에 키를 등록.
#
# 상태 영속화: 러너는 매번 초기화되므로 output/ 의 상태 json(보유목록·발송기록·KRX캐시)을
#   실행 후 저장소에 commit-back 한다.
# =============================================================================

name: Daily & Weekly Market Report

on:
  schedule:
    - cron: "0 23 * * 0-4"    # KST 월~금 08:00 — 한국장 장전 메일
    - cron: "40 7 * * 2-6"    # KST 화~토 16:40 — 미국장 마감 메일(17시경 도착)
    - cron: "30 22 * * 6"     # KST 일 07:30 — 주간 자산배분
  workflow_dispatch:
    inputs:
      mode:
        description: "강제 모드: kr / us / weekly / daily(둘 다) / preview(발송 없음)"
        required: false
        default: ""

permissions:
  contents: write               # 상태파일 commit-back용

concurrency:
  group: market-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report and send email
        env:
          # ── AI 해설: 2026-07-10부터 일단 비활성(API 없이 최대한 자동화 — pregen 캐시 +
          #   deterministic_report만으로 발송). 다시 켜려면 AI_ENABLED 줄 지우고 아래 5줄
          #   주석 해제 + Secrets에 ANTHROPIC_API_KEY 등록.
          AI_ENABLED: "0"
          # AI_BACKEND: "api"
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # REPORT_MODEL_VERIFY: "claude-sonnet-5"
          # REPORT_MODEL_WRITE: "claude-haiku-4-5"
          # REPORT_WEB: "1"            # 웹검색으로 뉴스 보강(비용 아끼려면 "0")
          # REPORT_WEB_USES: "4"       # 검색이 최대 비용원 — 묶음 검색 4회로 제한
          # AI_TIMEOUT: "900"
          # ── 발송
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
          # ── 한국 종목(pykrx, 2025-12-27부터 KRX Data Marketplace 로그인 필수로 바뀜)
          # 없으면 코스피200 섹션이 빈 채로 발송됨(에러는 아님). data.krx.co.kr 가입 후 등록.
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          # ── 전략 파라미터 (STRATEGY.md, 2026-07 재검증) — 기본 매도: 6개월 정기재평가 +
          #   200일선 -3% 백업. 트레일링은 순수익을 절반으로 깎는 것으로 확인되어 폐기,
          #   env 자체를 지정하지 않아 holdings.py 기본값(SELL_TRAIL=0, 비활성)을 따른다.
          SELL_MA_BUFFER: "0.03"     # 200일선 -3% 이탈
        run: |
          MODE="${{ github.event.inputs.mode }}"
          SCHED="${{ github.event.schedule }}"
          # 수동 실행(mode 입력) 우선, 스케줄 실행이면 어느 cron 인지로 분기
          if [ -z "$MODE" ]; then
            case "$SCHED" in
              "0 23 * * 0-4") MODE="kr" ;;
              "40 7 * * 2-6") MODE="us" ;;
              "30 22 * * 6")  MODE="weekly" ;;
            esac
          fi
          case "$MODE" in
            kr)      python daily_ai_report.py --kr ;;
            us)      python daily_ai_report.py --us ;;
            weekly)  python daily_ai_report.py --weekly ;;
            daily)   python daily_ai_report.py --daily --force ;;
            preview) python daily_ai_report.py --daily --no-email ;;
            *)       python daily_ai_report.py ;;   # 폴백: KST 시간 자동 분기
          esac

      - name: Upload preview artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: report-preview
          path: output/*.html
          if-no-files-found: ignore

      - name: Persist state (holdings·last_sent·KRX cache)
        if: ${{ always() }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/ai_holdings.json output/kr_holdings.json \
                     output/last_sent.json output/kospi200_cache.json 2>/dev/null || true
          git add state_prev_list.json 2>/dev/null || true
          # 2026-07-13 수정: `git status --porcelain --cached`는 존재하지 않는 옵션 조합이라
          # 항상 에러("unknown option `cached'")로 실패해 stdout이 비고, 그 결과 상태 변경이
          # 있어도 매번 "변경 없음"으로 오판해 커밋이 한 번도 안 됐다(last_sent.json이 git
          # 히스토리에 전무했던 원인 — 중복발송 가드가 Actions에서는 사실상 무력화돼 있었음).
          # 스테이징된 변경 유무는 git diff --cached --quiet(변경 있으면 종료코드 1)로 판단.
          if ! git diff --cached --quiet; then
            git commit -m "chore: update report state [skip ci]"
            git pull --rebase origin ${GITHUB_REF_NAME} || true
            git push
          else
            echo "상태 변경 없음 - 커밋 생략"
          fi
